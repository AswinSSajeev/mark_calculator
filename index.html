<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mark Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Mark Calculator</h1>

    <div class="input-group">
      <label for="mark1">Subject 1 Marks</label>
      <input type="number" id="mark1" placeholder="Enter marks" />
    </div>

    <div class="input-group">
      <label for="mark2">Subject 2 Marks</label>
      <input type="number" id="mark2" placeholder="Enter marks" />
    </div>

    <div class="input-group">
      <label for="mark3">Subject 3 Marks</label>
      <input type="number" id="mark3" placeholder="Enter marks" />
    </div>

    <button onclick="calculateAverage()">Calculate Average</button>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
